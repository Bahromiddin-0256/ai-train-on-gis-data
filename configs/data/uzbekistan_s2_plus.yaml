# Richer Uzbekistan-S2 data config: Mixup/CutMix, temporal+band dropout.
#
# Channel layout: 3 windows × 15 ch/window (9 bands + 6 indices) = 45 total.
# Indices: ndvi,evi,ndwi,ndre,msi,nbr — set via build_dataset.py --indices.

defaults:
  - uzbekistan_s2
  - _self_

# Multi-temporal layout hint used by TemporalDropout.
n_windows: 3

# Whole-timestamp dropout (p fraction of windows zeroed each step).
temporal_dropout: 0.15

# Per-channel dropout.
band_dropout: 0.1

# Batch-level mixing (soft labels).
mixup_alpha: 0.2
cutmix_alpha: 1.0
mix_prob: 0.5
mix_switch_prob: 0.5
