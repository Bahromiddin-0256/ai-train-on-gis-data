# Data config: Sentinel-2 imagery + CropHarvest labels over Uzbekistan.
#
# For offline/CI runs, set `source: synthetic` (the DataModule will generate
# tiny in-memory GeoTIFF fixtures instead of reading from disk).

_target_: gis_train.data.datamodule.CropDataModule

# One of: "cropharvest", "synthetic", "local"
source: local

# Number of samples to generate when source == "synthetic" (ignored otherwise).
synthetic_n: 128

# Where raw / processed data lives (ignored when source == "synthetic").
data_dir: ${hydra:runtime.cwd}/data

# Optional external test set directory (images.npy + labels.npy).
# If set, this is used as the test split instead of a random split from data_dir.
external_test_dir: null

# Country filter for CropHarvest loader.
country: Uzbekistan

# Default AOI — all of Uzbekistan. WGS84 (lon_min, lat_min, lon_max, lat_max).
# Used by the Sentinel-2 STAC downloader only. Override with --data.bbox=...
bbox: [56.00, 37.00, 73.15, 45.60]

# Date window for Sentinel-2 scene search (single-temporal fallback).
# For multi-temporal extraction use scripts/build_dataset.py --date-windows.
date_start: "2025-04-01"
date_end: "2025-09-30"
cloud_cover_max: 20

# Sentinel-2 bands fetched per time window (9 raw bands).
# Spectral indices are computed at chip-fetch time and appended per window.
# Channel layout: (9 bands + 6 indices) × 3 windows = 15 ch/window × 3 = 45 total.
# Model in_channels must match (resnet50_s2/convnext_s2: 45, tempcnn_s2: channels_per_window=15).
# Recompute mean/std after rebuilding the dataset:
#   python scripts/compute_band_stats.py \
#       --images data/processed_regional_mt/images.npy \
#       --out configs/data/uzbekistan_s2.yaml
bands: ["B02", "B03", "B04", "B05", "B06", "B07", "B08", "B11", "B12"]
indices: ["ndvi", "evi", "ndwi", "ndre", "msi", "nbr"]

# Per-channel normalization for 45-channel input (3 windows × 15 ch/window).
# Order per window: B02,B03,B04,B05,B06,B07,B08,B11,B12,NDVI,EVI,NDWI,NDRE,MSI,NBR
# Placeholder values — recompute with compute_band_stats.py after rebuilding images.npy.
mean: [0.1811, 0.2185, 0.2329, 0.2726, 0.3445, 0.3698, 0.3816, 0.3211, 0.2674, 0.6047, 0.6199, 0.6163, 0.5678, 0.2648, 0.5741, 0.1560, 0.1950, 0.2014, 0.2541, 0.3566, 0.3856, 0.3912, 0.3022, 0.2346, 0.6406, 0.6614, 0.6432, 0.5912, 0.2271, 0.6088, 0.1589, 0.1960, 0.2093, 0.2629, 0.3433, 0.3677, 0.3817, 0.3135, 0.2437, 0.6324, 0.6449, 0.6434, 0.5816, 0.2527, 0.5993]
std:  [0.0704, 0.0804, 0.0946, 0.0942, 0.1099, 0.1228, 0.1292, 0.1107, 0.1009, 0.1164, 0.1270, 0.1093, 0.0966, 0.0950, 0.1017, 0.0767, 0.0920, 0.1102, 0.1190, 0.1545, 0.1695, 0.1740, 0.1415, 0.1154, 0.0980, 0.1153, 0.0840, 0.0685, 0.1064, 0.0782, 0.0611, 0.0739, 0.0904, 0.0977, 0.1189, 0.1285, 0.1350, 0.1168, 0.0971, 0.0878, 0.0968, 0.0793, 0.0650, 0.0940, 0.0760]

# Image patch size fed to the model.
image_size: 64

# DataLoader settings.
batch_size: 32
num_workers: 4
pin_memory: true

# Train/val/test fractions (used when upstream data has no explicit split).
val_split: 0.15
test_split: 0.15

# Class labels (order is meaningful: index -> name).
# Derived from uzcosmos_flats crop_type values (compound labels normalised
# to primary crop by scripts/export_mongodb.py).
classes:
  - bugdoy
  - other
  - paxta
