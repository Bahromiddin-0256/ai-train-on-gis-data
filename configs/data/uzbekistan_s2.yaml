# Data config: Sentinel-2 imagery + CropHarvest labels over Uzbekistan.
#
# For offline/CI runs, set `source: synthetic` (the DataModule will generate
# tiny in-memory GeoTIFF fixtures instead of reading from disk).

_target_: gis_train.data.datamodule.CropDataModule

# One of: "cropharvest", "synthetic", "local"
source: local

# Number of samples to generate when source == "synthetic" (ignored otherwise).
synthetic_n: 128

# Where raw / processed data lives (ignored when source == "synthetic").
data_dir: ${hydra:runtime.cwd}/data

# Optional external test set directory (images.npy + labels.npy).
# If set, this is used as the test split instead of a random split from data_dir.
external_test_dir: null

# Country filter for CropHarvest loader.
country: Uzbekistan

# Default AOI — all of Uzbekistan. WGS84 (lon_min, lat_min, lon_max, lat_max).
# Used by the Sentinel-2 STAC downloader only. Override with --data.bbox=...
bbox: [56.00, 37.00, 73.15, 45.60]

# Date window for Sentinel-2 scene search.
date_start: "2021-04-01"
date_end: "2021-10-31"
cloud_cover_max: 20

# Multispectral bands to load (10m bands by default).
bands: ["B02", "B03", "B04", "B08"]

# Per-band normalization — computed from data/processed_full (44 023 chips).
# Applied after scaling DN values to [0, 1] via division by 10_000.
mean: [0.1737, 0.2178, 0.2261, 0.4629]
std:  [0.0451, 0.0536, 0.0838, 0.0701]

# Image patch size fed to the model.
image_size: 64

# DataLoader settings.
batch_size: 32
num_workers: 4
pin_memory: true

# Train/val/test fractions (used when upstream data has no explicit split).
val_split: 0.15
test_split: 0.15

# Class labels (order is meaningful: index -> name).
# Derived from uzcosmos_flats crop_type values (compound labels normalised
# to primary crop by scripts/export_mongodb.py).
classes:
  - bugdoy
  - other
  - paxta
