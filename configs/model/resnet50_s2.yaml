# Model config: ResNet-50 backbone pretrained on Sentinel-2 via MoCo.
#
# The classifier head is replaced with a fresh Linear(num_classes) layer.

_target_: gis_train.models.classifier.CropClassifier
_recursive_: false

# Backbone architecture — "resnet50" | "resnet18" | "resnet50_random".
# "resnet50" loads Sentinel-2 MoCo pretrained weights from torchgeo.
backbone: resnet50

# Number of input channels (must match data.bands length).
in_channels: 4

# Number of output classes (must match len(data.classes)).
num_classes: 3

# Load torchgeo's Sentinel-2 MoCo pretrained weights for the backbone.
# Set to false for from-scratch training.
pretrained: false

# Optimizer.
optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  weight_decay: 1.0e-4

# LR scheduler (CosineAnnealingLR by default).
scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: ${trainer.max_epochs}
