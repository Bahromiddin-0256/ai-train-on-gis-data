# ConvNeXt-Tiny backbone with ImageNet pretrained weights, adapted for 30-channel input.

_target_: gis_train.models.classifier.CropClassifier
_recursive_: false

backbone: convnext_tiny

in_channels: 30

num_classes: 3

pretrained: true

class_weights: null

label_smoothing: 0.1

optimizer:
  _target_: torch.optim.AdamW
  lr: 2.0e-4
  weight_decay: 5.0e-2

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: ${trainer.max_epochs}
