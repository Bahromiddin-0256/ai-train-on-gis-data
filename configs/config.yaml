# Root Hydra config. Use CLI overrides to swap groups, e.g.
#   python -m gis_train.train data=uzbekistan_s2 model=resnet50_s2 trainer.max_epochs=20

defaults:
  - data: uzbekistan_s2
  - model: resnet50_s2
  - trainer: default
  - _self_

seed: 42
output_dir: ${hydra:runtime.cwd}/outputs
experiment_name: gis_train

hydra:
  run:
    dir: ${output_dir}/${experiment_name}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: ${output_dir}/${experiment_name}/multirun/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}
  job:
    chdir: false
